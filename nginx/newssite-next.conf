server {
    listen 80;
    server_name dailylens.com www.dailylens.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dailylens.com www.dailylens.com;

    ssl_certificate /etc/letsencrypt/live/dailylens.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailylens.com/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /sitemap.xml { proxy_pass http://127.0.0.1:5001; }
    location = /robots.txt { proxy_pass http://127.0.0.1:5001; }
    location = /feed.xml { proxy_pass http://127.0.0.1:5001; }
    location = /llms.txt { proxy_pass http://127.0.0.1:5001; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
